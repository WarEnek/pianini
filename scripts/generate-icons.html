<!DOCTYPE html>
<html>
<head><title>Generate Pianinni Icons</title></head>
<body>
<p>Open this in a browser and right-click the canvases to save the icons.</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  const scale = s / 100;

  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(0, 0, s, s);

  ctx.save();
  ctx.scale(scale, scale);

  // Ears
  ctx.fillStyle = '#2D2D2D';
  ctx.beginPath();
  ctx.moveTo(30, 43);
  ctx.lineTo(22, 18);
  ctx.lineTo(42, 35);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(70, 43);
  ctx.lineTo(78, 18);
  ctx.lineTo(58, 35);
  ctx.closePath();
  ctx.fill();

  // Head
  ctx.beginPath();
  ctx.ellipse(50, 55, 28, 24, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(40, 53, 7, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(60, 53, 7, 0, Math.PI * 2);
  ctx.fill();

  // Pupils
  ctx.fillStyle = '#2D2D2D';
  ctx.beginPath();
  ctx.arc(41, 54, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(61, 54, 4, 0, Math.PI * 2);
  ctx.fill();

  // Eye shine
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(39, 51, 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(59, 51, 1.8, 0, Math.PI * 2);
  ctx.fill();

  // Brand
  ctx.fillStyle = '#4A3F6B';
  ctx.font = 'bold 12px Nunito, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Pianinni', 50, 88);

  ctx.restore();
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body>
</html>
